<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <meta name="theme-color" content="#0B0A12" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta property="og:title" content="BarHop - Plan Your Perfect Night Out" />
    <meta property="og:description" content="Plan the perfect bar crawl with our interactive map. Discover bars, create routes, and save your favorite pub crawls." />
    <meta property="og:image" content="https://gobarhop.app/barhop-social-image.png" />

    <meta property="og:image:alt" content="BarHop - Interactive bar crawl planner with neon-style graphics showing routes between bars" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://gobarhop.app/" />
    <meta property="twitter:title" content="BarHop - Plan Your Perfect Night Out" />
    <meta property="twitter:description" content="Plan the perfect bar crawl with our interactive map. Discover bars, create routes, and save your favorite pub crawls." />

    <div id="root">
      <!-- Static fallback so the app name "BarHop" is present in the raw HTML
           for crawlers / branding verification that don't execute JS. React
           replaces this on mount. -->
      <noscript>BarHop — Plan Your Perfect Night Out</noscript>
      <h1 style="font-family: 'Rajdhani', sans-serif; color: #ecb256; text-align: center; margin-top: 2rem;">BarHop</h1>
    </div>
    <script type="module" src="/src/main.tsx"></script>
